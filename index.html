<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RPS Simulation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h3 { margin: 6px 0; }

#controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin: 5px;
}

button {
  padding: 8px 12px;
  font-size: 14px;
  border-radius: 6px;
}

input[type="range"] {
  width: 90px;
}

#countControls {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,0,0,0.6);
  padding: 5px 8px;
  border-radius: 6px;
}

#counter {
  font-size: 14px;
  margin: 5px;
  padding: 5px 10px;
  background: rgba(0,0,0,0.6);
  border-radius: 6px;
}

#game {
  width: 95vw;
  height: 60vh;
  max-height: 480px;
  border: 2px solid white;
  background: #222;
  position: relative;
  overflow: hidden;
}

.emoji {
  position: absolute;
  font-size: 14px;
}

/* 🔘 SLIDER SWITCH */
.switch-container {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,0,0,0.6);
  padding: 5px 8px;
  border-radius: 6px;
}

.switch {
  position: relative;
  width: 40px;
  height: 20px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.sliderSwitch {
  position: absolute;
  inset: 0;
  background: #555;
  border-radius: 20px;
  transition: 0.3s;
  cursor: pointer;
}

.sliderSwitch::before {
  content: "";
  position: absolute;
  height: 16px;
  width: 16px;
  left: 2px;
  top: 2px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

.switch input:checked + .sliderSwitch {
  background: #4caf50;
}

.switch input:checked + .sliderSwitch::before {
  transform: translateX(20px);
}

/* popup */
#popup {
  position: fixed;
  inset: 0;
  background: transparent;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  pointer-events: none;
}

#popupContent {
  background: #333;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  pointer-events: auto;
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

@media (max-width: 600px) {
  button { font-size: 13px; padding: 6px 10px; }
  .emoji { font-size: 13px; }
}
</style>
</head>
<body>

<h3>RPS Simulation</h3>

<div id="controls">
  <button onclick="startGame()">Start</button>
  <button onclick="togglePause()" id="pauseBtn">Pause</button>

  Speed:
  <input type="range" id="speedSlider" min="2" max="15" value="6">

  <div id="countControls">
    <button onclick="changeCount(-1)">−</button>
    <span id="countDisplay">24</span>
    <button onclick="changeCount(1)">+</button>
  </div>

  <!-- 🔘 NEW SWITCH -->
  <div class="switch-container">
    🪨
    <label class="switch">
      <input type="checkbox" id="emojiSwitch">
      <span class="sliderSwitch"></span>
    </label>
    ✊
  </div>
</div>

<div id="counter">🪨 0 | 📄 0 | ✂️ 0</div>
<div id="game"></div>

<div id="popup">
  <div id="popupContent">
    <h2 id="winnerText"></h2>
    <button onclick="startGame()">Restart</button>
  </div>
</div>

<script>
const game = document.getElementById("game");
const counter = document.getElementById("counter");
const popup = document.getElementById("popup");
const winnerText = document.getElementById("winnerText");
const slider = document.getElementById("speedSlider");
const pauseBtn = document.getElementById("pauseBtn");
const countDisplay = document.getElementById("countDisplay");
const emojiSwitch = document.getElementById("emojiSwitch");

let objects = [];
let animation;
let paused = false;
let count = 24;
let currentSpeed = slider.value;

const SIZE = 14;
const RADIUS = 8;

function getTypes() {
  return emojiSwitch.checked
    ? ["✊","✋","✌️"]
    : ["🪨","📄","✂️"];
}

function changeCount(delta) {
  count += delta;
  if (count < 1) count = 1;
  if (count > 32) count = 32;
  countDisplay.innerText = count;
}

slider.addEventListener("input", () => {
  currentSpeed = slider.value;
});

function startGame() {
  cancelAnimationFrame(animation);
  game.innerHTML = "";
  popup.style.display = "none";
  objects = [];
  paused = false;
  pauseBtn.innerText = "Pause";
  currentSpeed = slider.value;

  const TYPES = getTypes();

  for (let t of TYPES) {
    for (let i = 0; i < count; i++) {
      createObject(t);
    }
  }

  updateCounter();
  animate();
}

function togglePause() {
  paused = !paused;
  pauseBtn.innerText = paused ? "Resume" : "Pause";
  if (!paused) animate();
}

function createObject(type) {
  const el = document.createElement("div");
  el.className = "emoji";
  el.innerText = type;

  let angle = Math.random() * Math.PI * 2;

  const obj = {
    el,
    type,
    x: Math.random() * (game.clientWidth - SIZE),
    y: Math.random() * (game.clientHeight - SIZE),
    vx: Math.cos(angle),
    vy: Math.sin(angle)
  };

  game.appendChild(el);
  objects.push(obj);
}

function update() {
  for (let obj of objects) {

    let speed = Math.sqrt(obj.vx * obj.vx + obj.vy * obj.vy);
    if (speed === 0) speed = 0.1;

    obj.vx = (obj.vx / speed) * currentSpeed;
    obj.vy = (obj.vy / speed) * currentSpeed;

    obj.x += obj.vx;
    obj.y += obj.vy;

    if (obj.x <= 0) { obj.x = 0; obj.vx = Math.abs(obj.vx); }
    if (obj.x >= game.clientWidth - SIZE) { obj.x = game.clientWidth - SIZE; obj.vx = -Math.abs(obj.vx); }
    if (obj.y <= 0) { obj.y = 0; obj.vy = Math.abs(obj.vy); }
    if (obj.y >= game.clientHeight - SIZE) { obj.y = game.clientHeight - SIZE; obj.vy = -Math.abs(obj.vy); }

    obj.el.style.left = obj.x + "px";
    obj.el.style.top = obj.y + "px";
  }

  handleCollisions();
  updateCounter();
  checkWinner();
}

function handleCollisions() {
  for (let i = 0; i < objects.length; i++) {
    for (let j = i + 1; j < objects.length; j++) {

      let a = objects[i];
      let b = objects[j];

      let dx = a.x - b.x;
      let dy = a.y - b.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if (dist === 0) dist = 0.1;

      if (dist < RADIUS * 2) {

        let nx = dx / dist;
        let ny = dy / dist;

        let overlap = (RADIUS * 2) - dist;

        a.x += nx * overlap/2;
        a.y += ny * overlap/2;
        b.x -= nx * overlap/2;
        b.y -= ny * overlap/2;

        let tx = a.vx;
        let ty = a.vy;
        a.vx = b.vx;
        a.vy = b.vy;
        b.vx = tx;
        b.vy = ty;

        resolveBattle(a, b);
      }
    }
  }
}

function resolveBattle(a, b) {
  if (a.type === b.type) return;

  const t = getTypes();

  if (a.type === t[0] && b.type === t[2]) b.type = t[0];
  else if (a.type === t[2] && b.type === t[0]) a.type = t[0];

  else if (a.type === t[2] && b.type === t[1]) b.type = t[2];
  else if (a.type === t[1] && b.type === t[2]) a.type = t[2];

  else if (a.type === t[1] && b.type === t[0]) b.type = t[1];
  else if (a.type === t[0] && b.type === t[1]) a.type = t[1];

  a.el.innerText = a.type;
  b.el.innerText = b.type;
}

function updateCounter() {
  let r=0,p=0,s=0;
  const t = getTypes();

  for (let o of objects) {
    if (o.type===t[0]) r++;
    else if (o.type===t[1]) p++;
    else s++;
  }

  counter.innerText = `${t[0]} ${r} | ${t[1]} ${p} | ${t[2]} ${s}`;
}

function checkWinner() {
  const first = objects[0].type;
  if (objects.every(o => o.type === first)) {
    cancelAnimationFrame(animation);
    winnerText.innerText = "Winner: " + first;
    popup.style.display = "flex";
  }
}

function animate() {
  if (paused) return;
  update();
  animation = requestAnimationFrame(animate);
}
</script>

</body>
</html>
